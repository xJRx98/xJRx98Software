<!-- C&P Aquaplants Übersetzungs-Tool -->
<!-- Einbinden in pages/cp-translation.html -->
<div class="sticky-back">
  <button class="back-btn" onclick="showPage('cp-app')">
    <svg fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M15 18l-6-6 6-6"/></svg>
    Zurück zur App-Seite
  </button>
</div>

<main id="main-content">

<!-- HERO -->
<section style="position:relative;overflow:hidden;padding:80px 40px 56px;border-bottom:1px solid var(--border);">
  <div class="hero-grid"></div>
  <div class="hero-glow"></div>
  <div style="max-width:1100px;margin:0 auto;position:relative;z-index:1;">
    <div class="section-label">C&P Aquaplants</div>
    <h1 class="section-title" style="font-size:clamp(28px,4vw,52px);max-width:700px;">
      Übersetzungs-<em style="color:var(--accent);font-style:normal;">Fragebogen</em>
    </h1>
    <p class="section-desc" style="margin-top:16px;">
      433 Strings · 15 App-Bereiche · Dart-Export inklusive
    </p>
  </div>
</section>

<!-- TOOL -->
<section style="padding:40px 0 80px;">
  <div style="max-width:1100px;margin:0 auto;padding:0 40px;" id="tl-root">

    <!-- LANG SETUP -->
    <div id="tl-setup" style="background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px 32px;margin-bottom:28px;">
      <div class="section-label" style="margin-bottom:16px;">Zielsprache wählen</div>
      <div id="tl-presets" style="display:flex;flex-wrap:wrap;gap:8px;margin-bottom:20px;"></div>
      <div style="display:grid;grid-template-columns:1fr auto;gap:12px;max-width:480px;">
        <input id="tl-lang-name" type="text" placeholder="Sprache (z.B. Français)"
          style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;outline:none;"
          oninput="tlUpdate()">
        <input id="tl-lang-code" type="text" placeholder="Code (z.B. fr)" maxlength="5"
          style="background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:10px 14px;color:var(--text);font-family:var(--sans);font-size:14px;width:100px;outline:none;"
          oninput="tlUpdate()">
      </div>
    </div>

    <!-- PROGRESS BAR -->
    <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:28px;display:flex;align-items:center;gap:16px;flex-wrap:wrap;">
      <div style="flex:1;min-width:200px;">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
          <span style="font-family:var(--mono);font-size:11px;color:var(--muted2);letter-spacing:.06em;text-transform:uppercase;">Fortschritt</span>
          <span id="tl-progress-label" style="font-family:var(--mono);font-size:12px;color:var(--accent);">0 / 433</span>
        </div>
        <div style="height:4px;background:var(--border);border-radius:2px;overflow:hidden;">
          <div id="tl-progress-bar" style="height:100%;width:0%;background:var(--accent);border-radius:2px;transition:width .3s;"></div>
        </div>
      </div>
      <div style="display:flex;gap:10px;flex-wrap:wrap;">
        <button onclick="tlSaveJson()" class="btn-ghost" style="padding:9px 18px;font-size:13px;">
          &#8595; Speichern
        </button>
        <label class="btn-ghost" style="padding:9px 18px;font-size:13px;cursor:pointer;">
          &#8593; Laden
          <input type="file" accept=".json" onchange="tlLoadJson(event)" style="display:none;">
        </label>
        <button id="tl-export-btn" onclick="tlExportDart()" class="btn-primary" style="padding:9px 18px;font-size:13px;" disabled>
          Dart exportieren
        </button>
      </div>
    </div>

    <!-- MAIN LAYOUT -->
    <div style="display:grid;grid-template-columns:220px 1fr;gap:20px;align-items:start;">

      <!-- SIDEBAR -->
      <div id="tl-sidebar" style="position:sticky;top:80px;"></div>

      <!-- CONTENT -->
      <div>
        <!-- SECTION HEADER -->
        <div style="background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:16px 20px;margin-bottom:16px;">
          <div id="tl-section-title" style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--text);margin-bottom:6px;"></div>
          <div id="tl-section-loc" style="font-size:13px;color:var(--muted2);"></div>
        </div>

        <!-- FILTER + SEARCH -->
        <div style="display:flex;gap:10px;align-items:center;margin-bottom:16px;flex-wrap:wrap;">
          <input id="tl-search" type="text" placeholder="Suchen..."
            style="flex:1;min-width:180px;background:var(--bg);border:1px solid var(--border);border-radius:8px;padding:9px 14px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;"
            oninput="tlRender()">
          <div style="display:flex;gap:6px;">
            <button onclick="tlSetFilter('all')" id="tl-f-all" class="btn-ghost" style="padding:6px 14px;font-size:12px;">Alle</button>
            <button onclick="tlSetFilter('todo')" id="tl-f-todo" class="btn-ghost" style="padding:6px 14px;font-size:12px;">Offen</button>
            <button onclick="tlSetFilter('done')" id="tl-f-done" class="btn-ghost" style="padding:6px 14px;font-size:12px;">Fertig</button>
          </div>
        </div>

        <!-- ITEMS -->
        <div id="tl-items"></div>

        <!-- NAV BUTTONS -->
        <div style="display:flex;justify-content:space-between;margin-top:24px;padding-top:24px;border-top:1px solid var(--border);">
          <button onclick="tlPrevSection()" id="tl-prev" class="btn-ghost" style="padding:10px 20px;font-size:13px;">
            &#8592; Vorheriger Bereich
          </button>
          <span id="tl-page-indicator" style="font-family:var(--mono);font-size:12px;color:var(--muted2);align-self:center;"></span>
          <button onclick="tlNextSection()" id="tl-next" class="btn-primary" style="padding:10px 20px;font-size:13px;">
            Nächster Bereich &#8594;
          </button>
        </div>
      </div>

    </div>
  </div>
</section>

</main>

<!-- TOAST -->
<div id="tl-toast" style="position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--surface);border:1px solid var(--border-hi);border-radius:10px;padding:12px 22px;font-family:var(--mono);font-size:12px;color:var(--accent);letter-spacing:.06em;z-index:999;opacity:0;transition:opacity .3s,transform .3s;pointer-events:none;white-space:nowrap;"></div>

r unverdünnt zu messen!","context":"pH-Info-Dialog: Text"},{"key":"measureCalciumInfoTitle","de":"Info zum Calcium-Test","context":"Calcium-Info-Dialog: Titel"},{"key":"measureCalciumInfoContent","de":"Calcium ist immer mit einer 1:10 Verdünnung zu rechnen.  Nur bei erwarteten Calciumwerten von unter 10 mg/l macht ein unverdünnter Test Sinn.","context":"Calcium-Info-Dialog: Text"},{"key":"measureTestNitrateNitrite","de":"Nitrat/Nitrit","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestPhosphateCalcium","de":"Phosphat/Calcium","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestIron","de":"Eisen sensitiv","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestPotassium","de":"Kalium","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestSilicate","de":"Silikat","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestGh","de":"GH","context":"Timer-Auswahl: Test-Name"},{"key":"measureTestCustom","de":"Eigener Test","context":"Timer-Auswahl: Option für eigenen Test"},{"key":"measureResultTooHigh","de":"zu hoch","context":"Ergebnis-Zelle: Wert zu hoch — WICHTIG: intern immer auf DE gespeichert"},{"key":"measureResultTooLow","de":"zu niedrig","context":"Ergebnis-Zelle: Wert zu niedrig — WICHTIG: intern immer auf DE gespeichert"},{"key":"measureResultIdWrong","de":"Fotometer-\\nkennung falsch!","context":"Ergebnis-Zelle: falsche Fotometerkennung"},{"key":"measureDrops","de":"Tropfen","context":"Einheit für KH/GH — WICHTIG: intern immer auf DE gespeichert"},{"key":"measureTimerStart","de":"Mess-Timer starten","context":"Button: Mess-Timer starten"},{"key":"measureTimerSelect","de":"Welchen Timer starten?","context":"Dialog-Titel: Welchen Timer starten?"},{"key":"measureTimerStart2","de":"Starten","context":"Button im Timer-Dialog: Starten"},{"key":"measureTimerAbort","de":"Abbrechen","context":"Button im Timer-Dialog: Abbrechen"},{"key":"measureTimerDone","de":"[Parameter: String label] Alle Timer für $label beendet!","context":"Snackbar nach Timer-Ende ({ iumMaintenanceTypeWaterChange","de":"Wasserwechsel","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypePruning","de":"Rückschnitt","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypeFilterClean","de":"Filter reinigen","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypeTechChange","de":"Technik ändern","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypePlantSwap","de":"Pflanzen austauschen","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypeHardscapeChange","de":"Hardscape ändern","context":"Maßnahmen-Typ"},{"key":"aquariumMaintenanceTypeSubstrateSwap","de":"Bodengrund austauschen","context":"Maßnahmen-Typ"},{"key":"aquariumHintWaterChange","de":"z.B. Menge Wasserwechsel","context":"Platzhalter"},{"key":"aquariumHintPruning","de":"z.B. Rotala zurückgeschnitten","context":"Platzhalter"},{"key":"aquariumHintFilterClean","de":"z.B. Filtermedien gewechselt","context":"Platzhalter"},{"key":"aquariumHintTechChange","de":"z.B. neuer Skimmer","context":"Platzhalter"},{"key":"aquariumHintPlantSwap","de":"z.B. Anubias raus, Bucephalandra rein","context":"Platzhalter"},{"key":"aquariumHintHardscapeChange","de":"z.B. Steine umpositioniert","context":"Platzhalter"},{"key":"aquariumHintSubstrateSwap","de":"z.B. Sand erneuert","context":"Platzhalter"},{"key":"aquariumPlantsTitle","de":"Pflanzenliste","context":"Tab Pflanzen: Listen-Titel"},{"key":"aquariumPlantsAddButton","de":"Pflanze hinzufügen","context":"Tab Pflanzen: Button"},{"key":"aquariumPlantsDialogTitle","de":"Neue Pflanze hinzufügen","context":"Tab Pflanzen: Dialog-Titel"},{"key":"aquariumPlantsHint","de":"Pflanzenname eingeben","context":"Tab Pflanzen: Platzhalter"},{"key":"aquariumPlantsAddAction","de":"Hinzufügen","context":"Tab Pflanzen: Button im Dialog"},{"key":"aquariumLivestockTitle","de":"Besatzliste","context":"Tab Besatz: Listen-Titel"},{"key":"aquariumLivestockAddButton","de":"Besatz hinzufügen","context":"Tab Besatz: Button"},{"key":"aquariumLivestockCount","de":"Anzahl","context":"Tab Besatz: Spalten-Header"},{"key":"aquariumLivestockAddDialogTitle","de":"Neuen Besatz hinzufügen","context":"Tab Besatz: Dialog-Titel"},{"key":"aquariumLivestockEditDialogTitle","de":"Besatz bearbeiten","context":"Tab Besatz: Dialog-Titel Bearbeiten"},{"key":"aquariumLivestockNameLabel","de":"Besatz","context":"Tab Besatz: Feld-Label"},{"key":"aquariumLivestockNameHint","de":"Namen eingeben","context":"Tab Besatz: Platzhalter"},{"key":"aquariumLivestockCountLabel","de":"Anzahl","context":"Tab Besatz: Anzahl-Label"},{"key":"aquariumLivestockCountHint","de":"Anzahl eingeben","context":"Tab Besatz: Platzhalter"},{"key":"aquariumImageHint","de":"Bild auswählen","context":"Bild-Auswahl Hint"},{"key":"aquariumDiscardTitle","de":"Änderungen verwerfen?","context":"Dialog: Änderungen verwerfen?"},{"key":"aquariumDiscardContent","de":"Möchtest du wirklich ohne Speichern verlassen? Alle Änderungen gehen verloren.","context":"Dialog-Text: Verwerfen"},{"key":"aquariumDiscardLeave","de":"Verlassen","context":"Button: Verlassen"},{"key":"aquariumDeleteTitle","de":"Aquarium löschen?","context":"Dialog: Aquarium löschen?"},{"key":"aquariumDeleteContent","de":"[Parameter: String name] Möchtest du das Aquarium \"$name\" wirklich unwiderruflich löschen?","context":"Dialog-Text ({name} = Aquarium-Name)"},{"key":"aquariumDeleteConfirm","de":"Ja, löschen","context":"Button: Löschen bestätigen"},{"key":"aquariumMissingFieldsTitle","de":"Fehlende Angaben","context":"Dialog: Fehlende Angaben"},{"key":"aquariumMissingFieldsAutoContent","de":"Bitte gib einen Namen sowie gültige Werte für Breite, Höhe und Tiefe ein.","context":"Dialog-Text: auto Modus"},{"key":"aquariumMissingFieldsManualContent","de":"Bitte gib einen Namen und ein gültiges Nettovolumen ein.","context":"Dialog-Text: manueller Modus"},{"key":"aquariumYesNo","de":"Ja","context":"Ja/Nein-Label"}]},{"title":"Onboarding","location":"Intro-Tour beim allerersten App-Start — Titel und Beschreibungen der einzelnen Seiten","items":[{"key":"onboardingPage1_title","de":"Willkommen!","context":"Onboarding Seite 1: Titel"},{"key":"onboardingPage1_description","de":"Willkommen in der C&P Aquaplants App. Du bekommst zu Beginn eine Tour durch die App, dann kannst du sofort loslegen.","context":"Onboarding Seite 1: Beschreibungstext"},{"key":"onboardingPage2_title","de":"Aquarium anlegen","context":"Onboarding Seite 2: Titel"},{"key":"onboardingPage2_description","de":"Lege beliebig viele Aquarien an. Die Reihenfolge deiner Aquarien kannst du durch Verschieben flexibel anpassen.","context":"Onboarding Seite 2: Beschreibungstext"},{"key":"onboardingPage3_title","de":"Größe eingeben","context":"Onboarding Seite 3: Titel"},{"key":"onboardingPage3_description","de":"Gib die Maße deines Aquariums, sowie weitere Infos zum Bodengrundaufbau etc. ein.  Dein Nettovolumen wird daraus automatisch berechnet. Du kannst dein Nettovolumen natürlich auch manuell eingeben.","context":"Onboarding Seite 3: Beschreibungstext"},{"key":"onboardingPage4_title","de":"Technikkomponenten","context":"Onboarding Seite 4: Titel"},{"key":"onboardingPage4_description","de":"Hinterlege deine genutzten Technikkomponenten mit allen Details. Das kann später beim Support helfen.","context":"Onboarding Seite 4: Beschreibungstext"},{"key":"onboardingPage5_title","de":"Pflegeroutine","context":"Onboarding Seite 5: Titel"},{"key":"onboardingPage5_description","de":"Hier kannst du deine Pflegemaßnahmen dokumentieren, um immer den Überblick zu behalten.","context":"Onboarding Seite 5: Beschreibungstext"},{"key":"onboardingPage6_title","de":"Pflanzen","context":"Onboarding Seite 6: Titel"},{"key":"onboardingPage6_description","de":"Hier kannst du festhalten, welche Pflanzen du in deinem Becken hast.","context":"Onboarding Seite 6: Beschreibungstext"},{"key":"onboardingPage7_title","de":"Besatz","context":"Onboarding Seite 7: Titel"},{"key":"onboardingPage7_description","de":"Hier kannst du alle deine Tiere eintragen.","context":"Onboarding Seite 7: Beschreibungstext"},{"key":"onboardingPage8_title","de":"Einstellungen","context":"Onboarding Seite 8: Titel"},{"key":"onboardingPage8_description","de":"Auf der Unterseite deines Photometers findst du eine Kennzeichnung G002 oder G003 gefolgt von einer Nummer.  Diese Nummer ist die Seriennummer deines Geräts.\\n\\n Die Photometerkennung findest du ganz oben auf den Papiertabellen, die dem Photometer beim Kauf beigelegt waren. Ebenso war ein Blatt mit einem Faktor F beigelegt.\\n\\n Auf jedem deiner Wassertests steht eine Serie. Gib all diese Infos in den Einstellungen an und schon kannst du mit dem Messen loslegen.","context":"Onboarding Seite 8: Beschreibungstext"},{"key":"onboardingPage9_title","de":"Daten exportieren bzw. importieren","context":"Onboarding Seite 9: Titel"},{"key":"onboardingPage9_description","de":"Ganz unten bei den Einstellungen findest du Funktionen zum Exportieren, bzw. importieren aller Appdaten.  So kannst du die Daten ganz einfach von einem Gerät auf ein anderes übertragen. Dies funktioniert auch plattformübergreifend.","context":"Onboarding Seite 9: Beschreibungstext"},{"key":"onboardingPage10_title","de":"Messungen","context":"Onboarding Seite 10: Titel"},{"key":"onboardingPage10_description","de":"Gib einfach die Messwerte deines Photometers ein – das Ergebnis wird automatisch berechnet.  Wenn du kein Photometer verwendest, kannst du dies in den Einstellungen angeben und hier deine Messwerte von den Tröpfchentests angeben.","context":"Onboarding Seite 10: Beschreibungstext"},{"key":"onboardingPage11_title","de":"Timer","context":"Onboarding Seite 11: Titel"},{"key":"onboardingPage11_description","de":"Verwende den integrierten Timer in der App.  Dort sind schon einige Timer festgelegt, du kannst aber auch individuelle Timer erstellen.  So hast du immer die Zeit im Blick, ohne die App wechseln zu müssen.","context":"Onboarding Seite 11: Beschreibungstext"},{"key":"onboardingPage12_title","de":"Übersicht","context":"Onboarding Seite 12: Titel"},{"key":"onboardingPage12_description","de":"Behalte den Überblick: Wähle oben dein Aquarium aus. Die Tabelle zeigt alle Messwerte deines ausgewählten Aquariums.  Einträge lassen sich durch langes Drücken ganz einfach anpassen oder entfernen.","context":"Onboarding Seite 12: Beschreibungstext"},{"key":"onboardingPage13_title","de":"Messwerte teilen","context":"Onboarding Seite 13: Titel"},{"key":"onboardingPage13_description","de":"Oben rechts im Übersicht-Reiter findest du die Option Teilen. Deine letzten 5 Messungen, sowie alle Angaben zum Aquarium werden geteilt. \\n\\nSo kannst du den Support noch schneller und einfacher mit allen deinen Daten kontaktieren oder deine Daten mit Freunden teilen.","context":"Onboarding Seite 13: Beschreibungstext"},{"key":"onboardingPage14_title","de":"Düngung","context":"Onboarding Seite 14: Titel"},{"key":"onboardingPage14_description","de":"Beim Reiter Düngung kannst du deine Zielwerte eingeben. Dein Bedarf an Dünger wird dann automatisch für deine Aquarien berechnet.  Mit dem integrierten Salzrechner weißt du immer, wie viel Aufhärtesalz du nach dem Wasserwechsel zugeben musst.","context":"Onboarding Seite 14: Beschreibungstext"},{"key":"onboardingPage15_title","de":"Düngung","context":"Onboarding Seite 15: Titel"},{"key":"onboardingPage15_description","de":"Außerdem kannst du deine tägliche Düngung angeben, sowie das Datum Düngekapseln.  Gib einfach dein gewünschtes Intervall an und du wirst automatisch benachrichtigt, wenn neue Düngekapseln fällig sind.","context":"Onboarding Seite 15: Beschreibungstext"},{"key":"onboardingPage16_title","de":"Videomaterial","context":"Onboarding Seite 16: Titel"},{"key":"onboardingPage16_description","de":"In diesem Reiter wird dir ausgewähltes Videomaterial zum Photometer und der Düngung, sowie die neuesten Videos von C&P Aquaplants zur Verfügung gestellt.","context":"Onboarding Seite 16: Beschreibungstext"}]},{"title":"Impressum & Datenschutz","location":"Impressum-Scree const PRESETS = {
  "Français":"fr","Español":"es","Italiano":"it","Nederlands":"nl",
  "Polski":"pl","Português":"pt","Русский":"ru","日本語":"ja","中文":"zh",
  "한국어":"ko","Türkçe":"tr","العربية":"ar","Svenska":"sv",
  "Norsk":"no","Dansk":"da","Suomi":"fi","Čeština":"cs","Magyar":"hu"
};

let state = {
  section: 0,
  filter: "all",
  translations: {},
  langName: "",
  langCode: ""
};

const totalStrings = SECTIONS.reduce((a,s)=>a+s.items.length,0);

function filled() { return Object.values(state.translations).filter(v=>v&&v.trim()).length; }

function sectionFilled(i) {
  return SECTIONS[i].items.filter(item=>state.translations[item.key]&&state.translations[item.key].trim()).length;
}

function tlUpdate() {
  state.langName = document.getElementById("tl-lang-name").value.trim();
  state.langCode = document.getElementById("tl-lang-code").value.trim();
  const btn = document.getElementById("tl-export-btn");
  btn.disabled = !state.langName || !state.langCode;
  tlRenderProgress();
}

function tlSetFilter(f) {
  state.filter = f;
  ["all","todo","done"].forEach(id=>{
    const b = document.getElementById("tl-f-"+id);
    if(id===f) { b.style.borderColor="var(--accent)"; b.style.color="var(--accent)"; }
    else { b.style.borderColor=""; b.style.color=""; }
  });
  tlRender();
}

function tlRenderProgress() {
  const f = filled(), pct = Math.round(f/totalStrings*100);
  document.getElementById("tl-progress-label").textContent = f+" / "+totalStrings+" ("+pct+"%)";
  document.getElementById("tl-progress-bar").style.width = pct+"%";
  document.getElementById("tl-progress-bar").style.background = pct===100?"#22c55e":"var(--accent)";
}

function tlRenderSidebar() {
  const sb = document.getElementById("tl-sidebar");
  sb.innerHTML = SECTIONS.map((s,i)=>{
    const f = sectionFilled(i), pct = s.items.length ? Math.round(f/s.items.length*100) : 0;
    const active = i===state.section;
    return `<button onclick="tlGoSection(${i})" style="display:block;width:100%;text-align:left;padding:10px 12px;margin-bottom:3px;border-radius:8px;background:${active?"rgba(61,189,177,.1)":"transparent"};border:1px solid ${active?"var(--border-hi)":"transparent"};cursor:pointer;transition:all .2s;">
      <div style="font-size:12px;font-weight:${active?600:400};color:${active?"var(--accent)":"var(--muted2)"};margin-bottom:5px;line-height:1.3;">${s.title}</div>
      <div style="display:flex;align-items:center;gap:6px;">
        <div style="flex:1;height:3px;background:var(--border);border-radius:2px;overflow:hidden;">
          <div style="height:100%;width:${pct}%;background:${pct===100?"#22c55e":"var(--accent)"};border-radius:2px;"></div>
        </div>
        <span style="font-family:var(--mono);font-size:10px;color:var(--muted);white-space:nowrap;">${f}/${s.items.length}</span>
      </div>
    </button>`;
  }).join("");
}

function tlRender() {
  const s = SECTIONS[state.section];
  const search = (document.getElementById("tl-search")||{value:""}).value.toLowerCase();

  document.getElementById("tl-section-title").textContent = s.title;
  document.getElementById("tl-section-loc").innerHTML = "&#128205; "+s.location;
  document.getElementById("tl-page-indicator").textContent = (state.section+1)+" / "+SECTIONS.length;
  document.getElementById("tl-prev").disabled = state.section===0;
  document.getElementById("tl-next").textContent = state.section===SECTIONS.length-1 ? "✓ Fertig" : "Nächster Bereich →";

  const items = s.items.filter(item=>{
    if(state.filter==="done" && !(state.translations[item.key]||"").trim()) return false;
    if(state.filter==="todo" && (state.translations[item.key]||"").trim()) return false;
    if(search && !item.de.toLowerCase().includes(search) && !item.context.toLowerCase().includes(search) && !item.key.toLowerCase().includes(search)) return false;
    return true;
  });

  const container = document.getElementById("tl-items");
  if(items.length===0){
    container.innerHTML = `<div style="text-align:center;padding:48px;color:var(--muted);font-family:var(--mono);font-size:13px;">Keine Strings gefunden.</div>`;
    return;
  }

  container.innerHTML = items.map(item=>{
    const isDone = !!(state.translations[item.key]||"").trim();
    const isParam = item.de.startsWith("[Parameter:");
    const isLong = item.de.length > 80;
    const deText = item.de.length>220 ? item.de.slice(0,220)+"…" : item.de;
    const val = (state.translations[item.key]||"").replace(/"/g,"&quot;");
    const rows = Math.min(5, Math.ceil(item.de.length/55)+1);
    const borderColor = isDone ? "rgba(61,189,177,.3)" : "var(--border)";
    const inputEl = isLong
      ? `<textarea rows="${rows}" data-key="${item.key}" oninput="tlSet(this)"
           placeholder="${isParam ? "Parameter {name} etc. beibehalten" : "Übersetzung eingeben…"}"
           style="width:100%;box-sizing:border-box;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;resize:vertical;line-height:1.55;outline:none;">${val}</textarea>`
      : `<input type="text" data-key="${item.key}" oninput="tlSet(this)" value="${val}"
           placeholder="${isParam ? "Parameter {name} etc. beibehalten" : "Übersetzung…"}"
           style="width:100%;box-sizing:border-box;padding:9px 12px;background:var(--bg);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--sans);font-size:13px;outline:none;">`;

    return `<div style="margin-bottom:10px;border:1px solid ${borderColor};border-radius:10px;padding:14px 16px;background:var(--surface);transition:border-color .2s;">
      <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:10px;">
        <div>
          <code style="font-size:11px;color:var(--muted);font-family:var(--mono);">${item.key}</code>
          <div style="font-size:12px;color:var(--muted2);margin-top:3px;">&#128205; ${item.context}</div>
          ${isParam ? '<div style="font-size:11px;color:#c94b6d;margin-top:4px;">⚠ Parameter beibehalten: {name}, {days} etc.</div>' : ""}
        </div>
        ${isDone ? '<span style="color:var(--accent);font-size:18px;flex-shrink:0;">✓</span>' : ""}
      </div>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;">
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;">Deutsch</div>
          <div style="font-size:13px;color:var(--muted2);background:var(--bg2);padding:9px 12px;border-radius:8px;min-height:36px;line-height:1.55;">${deText.replace(/</g,"&lt;")}</div>
        </div>
        <div>
          <div style="font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px;">${state.langName||"Neue Sprache"}</div>
          ${inputEl}
        </div>
      </div>
    </div>`;
  }).join("");

  tlRenderSidebar();
  tlRenderProgress();
  updateFilterCounts();
}

function updateFilterCounts() {
  const s = SECTIONS[state.section];
  const done = sectionFilled(state.section);
  document.getElementById("tl-f-all").textContent = "Alle ("+s.items.length+")";
  document.getElementById("tl-f-todo").textContent = "Offen ("+(s.items.length-done)+")";
  document.getElementById("tl-f-done").textContent = "Fertig ("+done+")";
}

function tlSet(el) {
  state.translations[el.dataset.key] = el.value;
  tlRenderProgress();
  tlRenderSidebar();
  updateFilterCounts();
}

function tlGoSection(i) {
  state.section = i;
  if(document.getElementById("tl-search")) document.getElementById("tl-search").value="";
  state.filter = "all";
  tlSetFilter("all");
  tlRender();
  document.getElementById("tl-root").scrollIntoView({behavior:"smooth",block:"start"});
}

function tlPrevSection() { if(state.section>0) tlGoSection(state.section-1); }
function tlNextSection() {
  if(state.section<SECTIONS.length-1) tlGoSection(state.section+1);
  else tlShowToast("Alle Bereiche abgeschlossen! Jetzt Dart exportieren.");
}

function tlShowToast(msg) {
  const t = document.getElementById("tl-toast");
  t.textContent = msg;
  t.style.opacity="1";
  t.style.transform="translateX(-50%) translateY(0)";
  setTimeout(()=>{ t.style.opacity="0"; t.style.transform="translateX(-50%) translateY(20px)"; },2800);
}

function tlSaveJson() {
  const blob = new Blob([JSON.stringify({language:state.langName,code:state.langCode,translations:state.translations},null,2)],{type:"application/json"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "cp_translation_"+(state.langCode||"new")+".json";
  a.click();
  tlShowToast("Fortschritt gespeichert!");
}

function tlLoadJson(e) {
  const file = e.target.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = ev => {
    try {
      const d = JSON.parse(ev.target.result);
      if(d.translations) state.translations = d.translations;
      if(d.language) { state.langName=d.language; document.getElementById("tl-lang-name").value=d.language; }
      if(d.code) { state.langCode=d.code; document.getElementById("tl-lang-code").value=d.code; }
      tlUpdate();
      tlRender();
      tlShowToast("Fortschritt geladen: "+filled()+" Strings");
    } catch(err) { tlShowToast("Fehler beim Laden der Datei"); }
  };
  reader.readAsText(file);
  e.target.value="";
}

function tlExportDart() {
  if(!state.langName||!state.langCode) return;
  const cap = s=>s.charAt(0).toUpperCase()+s.slice(1);
  const className = "Strings"+cap(state.langCode);
  const lines = [
    "import \'strings_base.dart\';",
    "import \'onboarding_page_data.dart\';",
    "",
    "/// "+state.langName+" — erstellt via C&P Übersetzungs-Tool.",
    "class "+className+" extends StringsBase {"
  ];
  SECTIONS.forEach(section=>{
    lines.push("  // ── "+section.title+" "+"─".repeat(Math.max(0,56-section.title.length)));
    section.items.forEach(item=>{
      const val = state.translations[item.key];
      if(!val||!val.trim()) return;
      if(item.key.startsWith("onboardingPage")) return;
      const esc = val.replace(/\\/g,"\\\\").replace(/\x27/g,"\\\'");
      if(item.de.startsWith("[Parameter:")) {
        lines.push("  // TODO parametrisiert — bitte manuell anpassen:");
        lines.push("  // @override String "+item.key+"(...) => \'"+esc+"\';");
      } else {
        lines.push("  @override String get "+item.key+" => \'"+esc+"\';");
      }
    });
    lines.push("");
  });
  lines.push("  // ── Onboarding & Videos: bitte manuell aus strings_de.dart übernehmen und übersetzen.");
  lines.push("}");

  const code = lines.join("\n");
  const blob = new Blob([code],{type:"text/plain"});
  const a = document.createElement("a");
  a.href = URL.createObjectURL(blob);
  a.download = "strings_"+state.langCode+".dart";
  a.click();
  tlShowToast("strings_"+state.langCode+".dart exportiert!");
}

// Init presets
(function initPresets(){
  const container = document.getElementById("tl-presets");
  Object.entries(PRESETS).forEach(([name,code])=>{
    const btn = document.createElement("button");
    btn.textContent = name;
    btn.style.cssText = "padding:5px 14px;border:1px solid var(--border);border-radius:100px;background:transparent;color:var(--muted2);font-family:var(--sans);font-size:13px;cursor:pointer;transition:all .2s;";
    btn.onmouseover = ()=>{ btn.style.borderColor="var(--border-hi)"; btn.style.color="var(--text)"; };
    btn.onmouseout = ()=>{ if(state.langName!==name){ btn.style.borderColor="var(--border)"; btn.style.color="var(--muted2)"; } };
    btn.onclick = ()=>{
      document.getElementById("tl-lang-name").value=name;
      document.getElementById("tl-lang-code").value=code;
      state.langName=name; state.langCode=code;
      document.querySelectorAll("#tl-presets button").forEach(b=>{
        b.style.borderColor="var(--border)"; b.style.color="var(--muted2)";
        b.style.background="transparent";
      });
      btn.style.borderColor="var(--accent)"; btn.style.color="var(--accent)";
      btn.style.background="rgba(61,189,177,.08)";
      document.getElementById("tl-export-btn").disabled=false;
    };
    container.appendChild(btn);
  });
})();

// Initial render
tlSetFilter("all");
tlRender();

})();
</script>
