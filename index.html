*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:        #0d1117;
  --bg2:       #131a24;
  --surface:   #1a2233;
  --border:    rgba(61,189,177,.12);
  --border-hi: rgba(61,189,177,.35);
  --accent:    #3dbdb1;
  --accent2:   #2aa89c;
  --accent3:   #6ddad2;
  --red:       #c94b6d;
  --text:      #e8edf4;
  --muted:     #556070;
  --muted2:    #8a9ab0;
  --mono:      'Space Mono', monospace;
  --sans:      'DM Sans', sans-serif;
}

html { scroll-behavior: smooth; scroll-padding-top: 80px; }

body {
  font-family: var(--sans);
  background: var(--bg);
  color: var(--text);
  line-height: 1.65;
  overflow-x: hidden;
  padding-left: env(safe-area-inset-left);
  padding-right: env(safe-area-inset-right);
}

body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='1'/%3E%3C/svg%3E");
  opacity: .03;
  pointer-events: none;
  z-index: 0;
}

/* --- NAV --- */
nav {
  position: sticky;
  top: 0;
  z-index: 100;
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 0 48px;
  height: 64px;
  background: rgba(8,12,20,.92);
  backdrop-filter: blur(24px);
  -webkit-backdrop-filter: blur(24px);
  border-bottom: 1px solid var(--border);
  transition: background .3s;
}

.nav-logo {
  font-family: var(--mono);
  font-size: 15px;
  color: var(--accent);
  letter-spacing: .05em;
  text-decoration: none;
  cursor: pointer;
}

.nav-logo-img {
  height: 36px;
  width: auto;
  display: block;
  opacity: 1;
  transition: opacity .2s;
}
.nav-logo:hover .nav-logo-img { opacity: .85; }

.nav-links { display: flex; gap: 32px; }

.nav-links a {
  font-size: 13px;
  font-weight: 500;
  color: var(--muted2);
  text-decoration: none;
  letter-spacing: .03em;
  transition: color .2s;
  position: relative;
  cursor: pointer;
}

.nav-links a::after {
  content: '';
  position: absolute;
  bottom: -4px;
  left: 0;
  width: 0;
  height: 1px;
  background: var(--accent);
  transition: width .25s;
}

.nav-links a:hover { color: var(--accent); }
.nav-links a:hover::after { width: 100%; }

.nav-cta {
  font-size: 13px;
  font-weight: 600;
  padding: 8px 20px;
  background: transparent;
  border: 1px solid var(--border-hi);
  border-radius: 6px;
  color: var(--accent);
  cursor: pointer;
  transition: background .2s, border-color .2s;
  font-family: var(--sans);
  text-decoration: none;
  letter-spacing: .03em;
}
.nav-cta:hover {
  background: rgba(61,189,177,.08);
  border-color: var(--accent);
}

/* --- PAGE CONTAINER --- */
#page-container { min-height: 100vh; }

/* --- PAGE LOADING --- */
.page-loading {
  display: flex;
  align-items: center;
  justify-content: center;
  min-height: 60vh;
  font-family: var(--mono);
  font-size: 12px;
  color: var(--muted);
  letter-spacing: .08em;
}

.page-loading::after {
  content: '';
  width: 16px; height: 16px;
  border: 1px solid var(--border-hi);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .8s linear infinite;
  margin-left: 12px;
}

@keyframes spin { to { transform: rotate(360deg); } }

/* --- SHARED SECTION STYLES --- */
section { position: relative; z-index: 1; }

.wrap {
  max-width: 1100px;
  margin: 0 auto;
  padding: 80px 40px;
}

.section-label {
  font-family: var(--mono);
  font-size: 11px;
  letter-spacing: .14em;
  text-transform: uppercase;
  color: var(--accent);
  margin-bottom: 12px;
}

.section-title {
  font-family: var(--mono);
  font-size: clamp(22px, 3vw, 38px);
  font-weight: 700;
  color: var(--text);
  letter-spacing: -.02em;
  line-height: 1.1;
  margin-bottom: 16px;
}

.section-desc {
  font-size: 15px;
  color: var(--muted2);
  max-width: 520px;
  line-height: 1.7;
}

.divider {
  border: none;
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border-hi), transparent);
  margin: 0;
}

/* --- BUTTONS --- */
.btn-primary {
  padding: 14px 28px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 600;
  color: #fff;
  background: linear-gradient(135deg, var(--accent2), #1e8f85);
  border: none;
  border-radius: 8px;
  cursor: pointer;
  transition: opacity .2s, transform .2s, box-shadow .2s;
  text-decoration: none;
  letter-spacing: .02em;
  box-shadow: 0 0 30px rgba(61,189,177,.2);
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.btn-primary:hover { opacity: .9; transform: translateY(-2px); box-shadow: 0 8px 40px rgba(61,189,177,.35); }
.btn-primary:active { transform: translateY(0); }

.btn-ghost {
  padding: 14px 28px;
  font-family: var(--sans);
  font-size: 14px;
  font-weight: 500;
  color: var(--muted2);
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 8px;
  cursor: pointer;
  transition: color .2s, border-color .2s, transform .2s, background .2s;
  text-decoration: none;
  letter-spacing: .02em;
  display: inline-flex;
  align-items: center;
  justify-content: center;
  text-align: center;
}
.btn-ghost:hover { color: var(--text); border-color: var(--border-hi); transform: translateY(-2px); background: rgba(61,189,177,.04); }
.btn-ghost:active { transform: translateY(0); }

/* --- HERO --- */
.hero {
  position: relative;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-align: center;
  padding: 120px 24px 80px;
  overflow: hidden;
}

.hero::after {
  content: '';
  position: absolute;
  inset: 0;
  background-image:
    linear-gradient(rgba(61,189,177,.04) 1px, transparent 1px),
    linear-gradient(90deg, rgba(61,189,177,.04) 1px, transparent 1px);
  background-size: 60px 60px;
  mask-image: radial-gradient(ellipse 80% 70% at 50% 0%, black 30%, transparent 100%);
}

.hero-orb { position: absolute; border-radius: 50%; filter: blur(120px); pointer-events: none; }
.hero-orb-1 { width: 600px; height: 600px; background: radial-gradient(circle, rgba(61,189,177,.12) 0%, transparent 70%); top: -200px; left: 50%; transform: translateX(-50%); }
.hero-orb-2 { width: 300px; height: 300px; background: radial-gradient(circle, rgba(201,75,109,.1) 0%, transparent 70%); bottom: 100px; right: 10%; }

.hero-badge {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 6px 14px;
  border: 1px solid var(--border-hi);
  border-radius: 100px;
  font-family: var(--mono);
  font-size: 11px;
  color: var(--accent);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 32px;
  position: relative;
  z-index: 1;
  animation: fadeUp .6s ease both;
}
.hero-badge::before { content: ''; width: 6px; height: 6px; background: #22c55e; border-radius: 50%; animation: pulse 2s infinite; }

@keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: .4; transform: scale(.8); } }

.hero h1 {
  font-family: var(--mono);
  font-size: clamp(32px, 7vw, 76px);
  font-weight: 700;
  line-height: 1.05;
  letter-spacing: -.02em;
  color: var(--text);
  position: relative;
  z-index: 1;
  animation: fadeUp .6s .1s ease both;
}
.hero h1 em { font-style: normal; color: var(--accent); display: block; }

.hero-sub {
  margin-top: 24px;
  font-size: 16px;
  font-weight: 300;
  color: var(--muted2);
  max-width: 580px;
  line-height: 1.7;
  position: relative;
  z-index: 1;
  animation: fadeUp .6s .2s ease both;
}

.hero-actions {
  display: flex;
  gap: 16px;
  margin-top: 44px;
  position: relative;
  z-index: 1;
  animation: fadeUp .6s .3s ease both;
  flex-wrap: wrap;
  justify-content: center;
}

.hero-scroll {
  position: absolute;
  bottom: 40px;
  left: 50%;
  transform: translateX(-50%);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 8px;
  color: var(--muted);
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  z-index: 1;
  animation: fadeUp .6s .5s ease both;
}
.scroll-line { width: 1px; height: 40px; background: linear-gradient(to bottom, var(--accent), transparent); animation: scrollAnim 2s ease infinite; }
@keyframes scrollAnim {
  0% { transform: scaleY(0); transform-origin: top; }
  50% { transform: scaleY(1); transform-origin: top; }
  51% { transform: scaleY(1); transform-origin: bottom; }
  100% { transform: scaleY(0); transform-origin: bottom; }
}

/* --- SERVICES --- */
.services-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
  gap: 1px;
  margin-top: 56px;
  border: 1px solid var(--border);
  border-radius: 16px;
  overflow: hidden;
}

.service-item {
  background: var(--surface);
  padding: 32px 28px;
  transition: background .25s;
  position: relative;
}
.service-item::before { content: ''; position: absolute; top: 0; left: 0; width: 3px; height: 0; background: var(--accent); transition: height .35s; }
.service-item:hover { background: var(--bg2); }
.service-item:hover::before { height: 100%; }
.service-icon { width: 40px; height: 40px; margin-bottom: 20px; color: var(--accent); opacity: .85; flex-shrink: 0; }
.service-item h3 { font-family: var(--mono); font-size: 15px; font-weight: 700; color: var(--text); margin-bottom: 10px; letter-spacing: -.01em; }
.service-item p { font-size: 14px; color: var(--muted2); line-height: 1.65; }

/* --- PROJECTS --- */
.projects-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
  gap: 20px;
  margin-top: 56px;
}

.project-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 28px;
  display: flex;
  flex-direction: column;
  transition: border-color .25s, transform .25s, box-shadow .25s;
  position: relative;
  overflow: hidden;
  cursor: pointer;
}
.project-card::after { content: ''; position: absolute; inset: 0; background: radial-gradient(ellipse 60% 40% at 50% -10%, rgba(61,189,177,.07), transparent 70%); opacity: 0; transition: opacity .35s; }
.project-card:hover { border-color: var(--border-hi); transform: translateY(-6px); box-shadow: 0 24px 60px rgba(0,0,0,.55), 0 0 0 1px rgba(61,189,177,.08); }
.project-card:hover::after { opacity: 1; }
.project-num { font-family: var(--mono); font-size: 11px; color: var(--muted); letter-spacing: .1em; margin-bottom: 20px; position: relative; z-index: 1; }
.project-card h3 { font-family: var(--mono); font-size: 18px; font-weight: 700; color: var(--text); margin-bottom: 12px; position: relative; z-index: 1; }
.project-card p { font-size: 14px; color: var(--muted2); line-height: 1.65; flex: 1; position: relative; z-index: 1; }
.project-link { display: inline-flex; align-items: center; gap: 8px; margin-top: 24px; font-family: var(--mono); font-size: 12px; letter-spacing: .06em; text-transform: uppercase; color: var(--accent); text-decoration: none; transition: gap .2s; position: relative; z-index: 1; background: none; border: none; cursor: pointer; padding: 0; }
.project-link:hover { gap: 12px; }
.project-link svg { width: 14px; height: 14px; }

/* --- CTA SECTION --- */
.cta-section {
  background: var(--bg2);
  border-top: 1px solid var(--border);
  border-bottom: 1px solid var(--border);
  position: relative;
  overflow: hidden;
}
.cta-section::before { content: ''; position: absolute; width: 800px; height: 400px; background: radial-gradient(ellipse, rgba(61,189,177,.06) 0%, transparent 70%); top: 50%; left: 50%; transform: translate(-50%, -50%); pointer-events: none; }
.cta-inner { max-width: 700px; margin: 0 auto; padding: 80px 24px; text-align: center; position: relative; z-index: 1; }
.cta-inner h2 { font-family: var(--mono); font-size: clamp(24px, 3.5vw, 44px); font-weight: 700; letter-spacing: -.02em; margin-bottom: 16px; }
.cta-inner p { font-size: 16px; color: var(--muted2); margin-bottom: 40px; }

/* --- CONTACT --- */
.contact-layout { display: grid; grid-template-columns: 1fr 1fr; gap: 60px; align-items: start; margin-top: 56px; }
.contact-info h3 { font-family: var(--mono); font-size: 16px; font-weight: 700; color: var(--text); margin-bottom: 16px; }
.contact-info p { font-size: 14px; color: var(--muted2); line-height: 1.7; margin-bottom: 32px; }
.contact-note { display: flex; align-items: flex-start; gap: 12px; padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: 10px; }
.contact-note-dot { width: 8px; height: 8px; border-radius: 50%; background: #22c55e; margin-top: 4px; flex-shrink: 0; }
.contact-note p { margin: 0; font-size: 13px; color: var(--muted2); }
.contact-note strong { color: var(--text); font-weight: 600; }
.contact-form { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; padding: 32px; }
.form-group { margin-bottom: 16px; }
.form-group label { display: block; font-family: var(--mono); font-size: 11px; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); margin-bottom: 8px; }
.form-group input, .form-group textarea { width: 100%; padding: 12px 16px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-family: var(--sans); font-size: 16px; transition: border-color .2s, box-shadow .2s; outline: none; resize: vertical; }
.form-group input:focus, .form-group textarea:focus { border-color: var(--border-hi); box-shadow: 0 0 0 3px rgba(61,189,177,.12); }
:focus-visible { outline: 2px solid var(--accent); outline-offset: 3px; }
a:focus-visible, button:focus-visible { border-radius: 4px; }
.form-group textarea { min-height: 130px; }
.form-submit { width: 100%; padding: 13px; font-family: var(--sans); font-size: 14px; font-weight: 600; color: #fff; background: linear-gradient(135deg, var(--accent2), #1e8f85); border: none; border-radius: 8px; cursor: pointer; transition: opacity .2s, transform .2s, box-shadow .2s; margin-top: 8px; box-shadow: 0 0 24px rgba(61,189,177,.2); letter-spacing: .02em; -webkit-appearance: none; display: flex; align-items: center; justify-content: center; }
.form-submit:hover { opacity: .9; transform: translateY(-1px); box-shadow: 0 6px 32px rgba(61,189,177,.25); }

/* --- SHARED PRODUCT PAGE STYLES --- */
.hero-grid { position: absolute; inset: 0; background-image: linear-gradient(var(--border) 1px, transparent 1px), linear-gradient(90deg, var(--border) 1px, transparent 1px); background-size: 60px 60px; opacity: 0.4; mask-image: radial-gradient(ellipse 80% 80% at 50% 50%, black 30%, transparent 100%); }
.hero-glow { position: absolute; top: 20%; left: 10%; width: 600px; height: 600px; border-radius: 50%; background: radial-gradient(circle, rgba(61,189,177,0.06) 0%, transparent 70%); pointer-events: none; }
.hero-inner { max-width: 1100px; margin: 0 auto; width: 100%; position: relative; z-index: 1; }
.stats-bar { background: var(--surface); border-top: 1px solid var(--border); border-bottom: 1px solid var(--border); overflow-x: auto; -webkit-overflow-scrolling: touch; }
.stats-inner { max-width: 1100px; margin: 0 auto; padding: 0 24px; display: grid; grid-template-columns: repeat(4, 1fr); min-width: 480px; }
.stat { padding: 28px 20px; border-right: 1px solid var(--border); text-align: center; }
.stat:last-child { border-right: none; }
.stat-value { font-family: var(--mono); font-size: 28px; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; display: block; }
.stat-label { font-family: var(--mono); font-size: 10px; color: var(--muted2); letter-spacing: 0.08em; text-transform: uppercase; margin-top: 4px; }
.section-inner { max-width: 1100px; margin: 0 auto; }
.section-body { font-size: 15px; color: var(--muted2); max-width: 560px; line-height: 1.75; }
.problem-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 56px; }
.problem-card { background: var(--surface); padding: 32px; }
.problem-card h3 { font-family: var(--mono); font-size: 11px; letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 20px; }
.problem-card.red h3 { color: #c94b6d; }
.problem-card.green h3 { color: var(--accent); }
.problem-list { list-style: none; display: flex; flex-direction: column; gap: 12px; }
.problem-list li { display: flex; align-items: flex-start; gap: 12px; font-size: 14px; color: var(--muted2); line-height: 1.5; }
.problem-list li::before { content: '--'; font-family: var(--mono); flex-shrink: 0; margin-top: 1px; }
.problem-card.red .problem-list li::before { color: #c94b6d; }
.problem-card.green .problem-list li::before { color: var(--accent); }
.features-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 1px; background: var(--border); border: 1px solid var(--border); margin-top: 56px; }
.feature-card { background: var(--surface); padding: 32px; transition: background 0.2s; position: relative; overflow: hidden; }
.feature-card::before { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 1px; background: linear-gradient(90deg, transparent, var(--accent), transparent); opacity: 0; transition: opacity 0.3s; }
.feature-card:hover { background: var(--bg2); }
.feature-card:hover::before { opacity: 1; }
.feature-icon { font-size: 24px; margin-bottom: 20px; display: block; }
.feature-title { font-size: 15px; font-weight: 500; margin-bottom: 10px; color: var(--text); }
.feature-desc { font-size: 13px; color: var(--muted2); line-height: 1.65; }

<script>
// ==========================================
//  PAGE ROUTER
// ==========================================
const pageCache = {};
const VALID_PAGES = ['home','cp-app','wasserpantscher','patientenaufruf','impressum','datenschutz','ueber-mich', 'cp-translation', 'cp-datenschutz'];

function tryHistory(fn) { try { fn(); } catch(e) {} }

async function showPage(pageId, pushState = true) {
  if (!VALID_PAGES.includes(pageId)) pageId = 'home';

  // Show loading only if not cached
  if (!pageCache[pageId]) {
    document.getElementById('page-container').innerHTML = '<div class="page-loading">Lädt</div>';
  }

  try {
    if (!pageCache[pageId]) {
      const res = await fetch('pages/' + pageId + '.html');
      if (!res.ok) throw new Error('Page not found');
      pageCache[pageId] = await res.text();
    }
    document.getElementById('page-container').innerHTML = pageCache[pageId];
    window.scrollTo({ top: 0, behavior: 'smooth' });
    initReveal();
    runPageScripts();
    if (pushState) tryHistory(() => history.pushState({ page: pageId }, '', '#' + pageId));
  } catch(e) {
    document.getElementById('page-container').innerHTML = '<div class="page-loading">Seite nicht gefunden</div>';
  }
}

// Global verfügbar machen für onclick-Handler in dynamisch geladenem HTML
window.showPage        = showPage;
window.showProject     = showProject;
window.scrollToSection = scrollToSection;
window.openModal       = openModal;
window.closeModal      = closeModal;


function showProject(id) { showPage(id); }

function scrollToSection(id) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.scrollIntoView({ behavior: 'smooth' });
  }, 120);
}

// Run inline scripts inserted via innerHTML (they don't auto-execute)
function runPageScripts() {
  document.getElementById('page-container').querySelectorAll('script').forEach(old => {
    const s = document.createElement('script');
    if (old.src) s.src = old.src;
    else s.textContent = old.textContent;
    old.parentNode.replaceChild(s, old);
  });
}

window.addEventListener('popstate', e => showPage(e.state?.page || 'home', false));

window.addEventListener('DOMContentLoaded', () => {
  let start = 'home';
  try {
    const hash = location.hash.replace('#', '');
    if (VALID_PAGES.includes(hash)) start = hash;
    tryHistory(() => history.replaceState({ page: start }, '', start === 'home' ? location.pathname : '#' + start));
  } catch(e) {}
  showPage(start, false);

 });

// ==========================================
//  REVEAL OBSERVER
// ==========================================
function initReveal() {
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const el = entry.target;
        const siblings = [...el.parentElement.querySelectorAll('.reveal')];
        el.style.transitionDelay = (siblings.indexOf(el) * 0.07) + 's';
        el.classList.add('visible');
        observer.unobserve(el);
      }
    });
  }, { threshold: 0.1 });
  document.querySelectorAll('.reveal').forEach(el => {
    el.classList.remove('visible');
    el.style.transitionDelay = '0s';
    observer.observe(el);
  });
}

// ==========================================
//  NAV / MOBILE
// ==========================================
function toggleMobileMenu() {
  const btn = document.getElementById('nav-hamburger');
  const menu = document.getElementById('nav-mobile-menu');
  const isOpen = menu.classList.contains('open');
  menu.classList.toggle('open');
  btn.classList.toggle('open');
  btn.setAttribute('aria-expanded', !isOpen);
}
function closeMobileMenu() {
  document.getElementById('nav-hamburger').classList.remove('open');
  document.getElementById('nav-hamburger').setAttribute('aria-expanded', 'false');
  document.getElementById('nav-mobile-menu').classList.remove('open');
}
document.addEventListener('click', e => {
  const menu = document.getElementById('nav-mobile-menu');
  const btn  = document.getElementById('nav-hamburger');
  if (menu.classList.contains('open') && !menu.contains(e.target) && !btn.contains(e.target)) closeMobileMenu();
});

// ==========================================
//  SCROLL TO TOP
// ==========================================
window.addEventListener('scroll', () => {
  const btn = document.getElementById('scroll-top');
  if (!btn) return;
  btn.classList.toggle('visible', window.scrollY > 300);
}, { passive: true });

// ==========================================
//  MODAL HELPERS
// ==========================================
function openModal(id) { document.getElementById(id).style.display = 'flex'; }
function closeModal(id) { document.getElementById(id).style.display = 'none'; }

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none');
  }
});
</script>
