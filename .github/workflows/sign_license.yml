name: Sign License

on:
  workflow_dispatch:
    inputs:
      license_json:
        description: 'Lizenzdaten JSON'
        required: true

jobs:
  sign-and-send:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install cryptography requests

      - name: Sign license and send to GAS
        env:
          PRIVATE_KEY_B64: ${{ secrets.PRIVATE_KEY_B64 }}
          GAS_ENDPOINT: ${{ secrets.GAS_ENDPOINT }}   # z.B. https://script.google.com/macros/s/.../exec
        run: |
          echo '${{ github.event.inputs.license_json }}' > in.json
          python scripts/sign_license.py in.json out.json > LICENSE_B64.txt
          
          LICENSE_B64=$(cat LICENSE_B64.txt)
          echo "Signed license (Base64): $LICENSE_B64"

          # Optional: POST direkt an GAS
          python - << 'PYTHON'
import os, json, base64, requests
data_b64 = os.environ['LICENSE_B64']
endpoint = os.environ['GAS_ENDPOINT']

# Lizenzdaten wieder als JSON
lizenz_json = json.loads(base64.b64decode(data_b64).decode())
resp = requests.post(endpoint, json=lizenz_json)
print("GAS Response:", resp.status_code, resp.text)
PYTHON
